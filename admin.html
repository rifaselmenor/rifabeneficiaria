<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Rifa Ana Quintero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0F0A1E; --surface:#1A1035; --surface2:#231448; --text:#F1F0FF; }
    body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); }
    .card { background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:16px; }
    .badge-pendiente { background:rgba(251,191,36,.2); color:#FBB124; }
    .badge-aprobado  { background:rgba(20,184,166,.2); color:#5EEAD4; }
    .badge-rechazado { background:rgba(239,68,68,.2); color:#FCA5A5; }
    .form-input { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:12px; color:#fff; width:100%; padding:10px; }
    .num-chip { background:rgba(225,29,72,.25); border:1px solid rgba(225,29,72,.4); border-radius:6px; padding:2px 8px; font-weight:900; color:#FDA4AF; display:inline-block; margin:2px; }
  </style>
</head>
<body>
<div id="loginScreen" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
  <div class="card p-6 w-full max-w-sm text-center">
    <h1 class="text-xl font-black mb-4">🔐 Admin Ana Quintero</h1>
    <input type="password" id="loginPass" class="form-input mb-3" placeholder="Contraseña" />
    <button onclick="doLogin()" class="form-input bg-purple-600 font-bold border-none cursor-pointer">Ingresar</button>
  </div>
</div>

<div id="adminPanel" style="display:none">
  <div class="p-4 bg-purple-900 border-b border-purple-700 flex justify-between items-center sticky top-0 z-50">
    <div class="font-black">⚙️ Panel Admin</div>
    <button onclick="doLogout()" class="text-xs bg-black/30 px-3 py-1 rounded">Salir</button>
  </div>

  <div class="p-4">
    <div class="card p-4 mb-4 bg-yellow-900/20">
      <h3 class="font-bold text-yellow-300 mb-2">🏆 Buscar Ganador (00-99)</h3>
      <div class="flex gap-2">
        <input type="text" id="winnerInput" class="form-input text-center text-xl font-black" placeholder="00" maxlength="2" />
        <button onclick="buscarGanador()" class="bg-yellow-500 text-black font-black px-4 rounded-xl">🔍</button>
      </div>
      <div id="winnerResult" class="mt-3"></div>
    </div>

    <input type="text" id="adminSearch" class="form-input mb-4" placeholder="🔍 Buscar por cédula o nombre..." oninput="applyFilter(this.value)" />
    
    <div class="flex gap-2 mb-4 overflow-x-auto">
      <button class="bg-white/10 px-4 py-1 rounded-lg text-sm" onclick="filterPedidos('todos')">Todos</button>
      <button class="bg-white/10 px-4 py-1 rounded-lg text-sm" onclick="filterPedidos('pendiente')">Pendientes</button>
      <button class="bg-white/10 px-4 py-1 rounded-lg text-sm" onclick="filterPedidos('aprobado')">Aprobados</button>
    </div>

    <div id="pedidosList" class="space-y-3"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const ADMIN_PASSWORD = 'Mafer';
let allPedidos = [];
let currentFilter = 'todos';

function doLogin() {
  if (document.getElementById('loginPass').value === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'block';
    loadPedidos();
  } else { alert('❌ Contraseña incorrecta'); }
}
function doLogout() { location.reload(); }

async function loadPedidos() {
  try {
    const { data, error } = await db.from('pedidos').select('*').order('created_at', { ascending:false });
    if (error) throw error;
    allPedidos = data || [];
    renderPedidos(allPedidos);
  } catch(err) { console.error(err); }
}

function renderPedidos(pedidos) {
  const list = document.getElementById('pedidosList');
  if (!pedidos.length) { list.innerHTML = '<div class="text-center py-4">No hay pedidos</div>'; return; }
  list.innerHTML = pedidos.map(p => `
    <div class="card p-4">
      <div class="flex justify-between mb-2">
        <div class="font-black">${p.nombre}</div>
        <span class="text-xs px-2 py-1 rounded badge-${p.estado}">${p.estado.toUpperCase()}</span>
      </div>
      <div class="text-sm text-gray-400 mb-2">C.I: ${p.cedula} | Ref: ${p.ref_comprobante}</div>
      <div class="mb-3">
        ${(p.numeros || []).map(n => `<span class="num-chip">${String(n).padStart(2,'0')}</span>`).join('')}
      </div>
      ${p.capture_url ? `<a href="${p.capture_url}" target="_blank" class="text-sky-400 text-xs block mb-3">🖼️ Ver capture</a>` : ''}
      ${p.estado === 'pendiente' ? `
        <div class="flex gap-2">
          <button class="bg-green-600 w-full py-2 rounded font-bold" onclick="approveOrder('${p.id}')">Aprobar</button>
          <button class="bg-red-600 w-full py-2 rounded font-bold" onclick="rejectOrder('${p.id}')">Rechazar</button>
        </div>` : ''}
    </div>`).join('');
}

async function approveOrder(id) {
  if(!confirm('¿Aprobar?')) return;
  await db.from('pedidos').update({estado:'aprobado'}).eq('id',id);
  await db.from('tickets').update({estado:'vendido'}).eq('pedido_id',id);
  loadPedidos();
}

async function rejectOrder(id) {
  if(!confirm('¿Rechazar y liberar números?')) return;
  await db.from('pedidos').update({estado:'rechazado'}).eq('id',id);
  await db.from('tickets').delete().eq('pedido_id',id); // Esto libera los números en index.html
  loadPedidos();
}

function filterPedidos(estado) {
  currentFilter = estado; applyFilter(document.getElementById('adminSearch').value);
}

function applyFilter(query) {
  let f = allPedidos;
  if (currentFilter !== 'todos') f = f.filter(p => p.estado === currentFilter);
  if (query) {
    const q = query.toLowerCase();
    f = f.filter(p => p.nombre.toLowerCase().includes(q) || p.cedula.toLowerCase().includes(q));
  }
  renderPedidos(f);
}

async function buscarGanador() {
  const num = parseInt(document.getElementById('winnerInput').value);
  const resultDiv = document.getElementById('winnerResult');
  if (isNaN(num) || num < 0 || num > 99) { resultDiv.innerHTML = '⚠️ Número inválido (00-99)'; return; }
  
  try {
    const { data:t } = await db.from('tickets').select('pedido_id').eq('numero',num).maybeSingle();
    if (!t || !t.pedido_id) { resultDiv.innerHTML = '<div class="text-red-400">Sin dueño</div>'; return; }
    const { data:p } = await db.from('pedidos').select('*').eq('id',t.pedido_id).single();
    
    resultDiv.innerHTML = `
      <div class="p-3 bg-green-900/40 rounded-xl border border-green-500">
        <div class="text-yellow-400 font-black text-xl mb-1">¡GANADOR: ${String(num).padStart(2,'0')}!</div>
        <div class="font-bold">${p.nombre}</div>
        <div class="text-sm">Tlf: ${p.whatsapp}</div>
      </div>`;
  } catch(err) { resultDiv.innerHTML = '❌ Error buscando ganador'; }
}
</script>
</body>
</html>
